  <div id="layout-dialog" class="layout-dialog" role="dialog" aria-modal="true" aria-labelledby="layout-dialog-title" hidden>
    <button type="button" id="layout-dialog-backdrop" class="layout-dialog__backdrop" aria-label="Close" tabindex="-1"></button>
    <div class="layout-dialog__panel">
      <header class="layout-dialog__head">
        <h3 id="layout-dialog-title" class="layout-dialog__title layout-dialog__title--edit">Dashboard layout</h3>
        <p id="layout-dialog-title-preview" class="layout-dialog__title layout-dialog__title--preview" hidden>
          Previewing <strong id="layout-preview-view-name">Default</strong>
          <span id="layout-preview-modified" class="layout-preview-modified" hidden>· modified</span>
        </p>
        <div class="layout-dialog__head-actions layout-dialog__head-actions--edit">
          <button type="button" id="layout-dialog-preview" class="layout-dialog__preview" aria-pressed="false">Preview</button>
          <button type="button" id="layout-dialog-close" class="layout-dialog__close" aria-label="Close">×</button>
        </div>
        <div class="layout-dialog__head-actions layout-dialog__head-actions--preview" hidden>
          <button type="button" id="layout-preview-edit" class="settings-btn settings-btn--ghost">Edit panels</button>
          <button type="button" id="layout-preview-done" class="settings-btn">Done</button>
        </div>
      </header>
      <div id="layout-confirm-strip" class="layout-confirm-strip" hidden>
        <p id="layout-confirm-message" class="layout-confirm-message"></p>
        <div class="layout-confirm-actions">
          <button type="button" id="layout-confirm-no" class="settings-btn settings-btn--ghost">Cancel</button>
          <button type="button" id="layout-confirm-yes" class="settings-btn settings-btn--primary">Confirm</button>
        </div>
      </div>
      <div class="layout-dialog__body">
        <section class="layout-dialog__views" aria-label="Dashboard views">
          <h4 class="layout-dialog__pane-title">Views</h4>
          <ul id="layout-view-list" class="layout-view-list"></ul>
          <section id="layout-new-view-section" class="layout-new-view">
            <h5 class="layout-new-view__title">Save current as custom view</h5>
            <label for="layout-new-view-name" class="layout-new-view__label">Name</label>
            <input type="text" id="layout-new-view-name" class="layout-new-view__name" maxlength="48" placeholder="My view">
            <label for="layout-new-view-template" class="layout-new-view__label">Start from</label>
            <select id="layout-new-view-template" class="layout-new-view__template"></select>
            <button type="button" id="layout-new-view-save" class="settings-btn settings-btn--primary">Save view</button>
          </section>
        </section>
        <section class="layout-dialog__panels" aria-label="Panel visibility">
          <div class="layout-dialog__panels-head">
            <h4 id="layout-panel-title" class="layout-dialog__pane-title">Panels</h4>
            <input type="search" id="layout-panel-search" class="layout-panel-search" placeholder="Search panels…" autocomplete="off">
          </div>
          <div id="layout-panel-actions" class="layout-panel-actions">
            <button type="button" id="layout-show-all-panels" class="settings-btn settings-btn--link">Show all</button>
            <button type="button" id="layout-hide-all-panels" class="settings-btn settings-btn--link">Hide all</button>
            <button type="button" id="layout-reset-btn" class="settings-btn settings-btn--link">Reset to defaults</button>
            <button type="button" id="layout-revert-btn" class="settings-btn settings-btn--link" hidden>Revert changes</button>
          </div>
          <div id="layout-panel-groups" class="layout-panel-groups"></div>
        </section>
      </div>
      <footer class="layout-dialog__foot">
        <div class="layout-dialog__foot-left">
          <button type="button" id="layout-duplicate-btn" class="settings-btn settings-btn--ghost">Duplicate</button>
          <button type="button" id="layout-export-btn" class="settings-btn settings-btn--ghost">Export</button>
          <button type="button" id="layout-copy-btn" class="settings-btn settings-btn--ghost">Copy JSON</button>
          <button type="button" id="layout-import-btn" class="settings-btn settings-btn--ghost">Import</button>
          <input type="file" id="layout-import-input" accept="application/json,.json" hidden>
          <span id="layout-footer-count" class="layout-footer-count">0 / 20 custom views</span>
        </div>
        <p class="settings-error mono layout-error" id="layout-error" hidden></p>
        <button type="button" id="layout-dialog-done" class="settings-btn">Done</button>
      </footer>
      <div id="layout-dialog-resize" class="layout-dialog__resize-handle" role="separator"
           aria-orientation="vertical" aria-label="Resize layout panel" tabindex="0"></div>
    </div>
  </div>
