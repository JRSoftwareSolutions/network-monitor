target: 8.8.8.8
ping_interval_seconds: 1
retention_minutes: 180
listen_host: 127.0.0.1
listen_port: 8080
data_dir: ./data
thresholds:
    ping_great: 40
    ping_good: 70
    ping_okay: 110
    ping_max: 200
    jitter_great: 8
    jitter_good: 15
    jitter_okay: 30
    jitter_max: 60
    loss_good: 1
    loss_okay: 3
    loss_max: 15
